<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Your AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: rgb(241,240,238);
      color: rgb(37,37,37);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      padding-top: 76px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .nav-wrap { padding: 0 16px !important; }
      .nav-pill { padding: 8px 14px !important; border-radius: 20px !important; }
      .diensten-grid { grid-template-columns: 1fr !important; }
      .diensten-item-inner { padding-left: 0 !important; border-left: none !important; padding-right: 0 !important; }
      .overview-outer { grid-template-columns: 1fr !important; gap: 0 !important; }
      .overview-label-col { display: none; }
      .overview-row { grid-template-columns: 1fr !important; }
      .overview-photo { display: none; }
      .case-meta { grid-template-columns: 1fr !important; }
      .case-stat { align-items: flex-start !important; flex-direction: row !important; gap: 8px !important; align-items: baseline !important; }
      .n8n-outer { overflow-x: auto; }
      .n8n-inner { min-width: 700px; }
      .nav-menu-label { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    /* ─── COPY ─── */
    const COPY = {
      en: {
        heroTitle: 'AI Made Clear.<br>Results That Count.',
        heroSub: "AI doesn't have to be complicated. I make it understandable and practical for every business, big or small. No jargon, no loose theory. Just hands-on approaches that save real time.",
        ctaDiensten: 'My Services', ctaGesprek: 'Schedule an intro call →',
        dienstenLabel: 'services',
        d1Title: 'Training &amp;<br>Workshops',
        d1Desc: "For groups of 6 to 1,200 people. From team days to conferences. Practical, energetic, and immediately applicable, no dry theory, just tools you'll use the very next day.",
        d2Title: 'Smart<br>Client Growth',
        d2Desc: 'I use AI to turn your website visitors into paying clients. From conversion-focused content to automated follow-up: I build the system that keeps your growth going, even when you are not.',
        d3Title: 'Processes<br>in Order',
        d3Desc: 'I map your administrative processes and automate what costs you unnecessary time. So you can put your energy into what truly matters: your clients and your growth.',
        resultNum: '10 hrs / week', resultText: 'My goal: save you at least 10 hours per week within 90 days. Measurable, concrete, no vague promises.',
        testimonialQuote: '"Jori improved and automated our sales process in a short time, giving us more time to focus on bringing in new clients."',
        testimonialCompany: 'Wall to Wall Art Solutions',
        c1Name: 'Wall to Wall<br>Art Solutions', c1ScopeLabel: 'Scope',
        c1Scope: 'N8N Sales Agent',
        c1Desc: 'An AI agent in N8N that automatically responds to new art transport requests as a draft email. The agent writes in the exact tone of voice of Wall to Wall and smartly collects all the information needed for the team to produce a quote immediately.',
        c1StatNum: '6 hrs', c1StatLabel: 'saved per week',
        ovLabel: 'overview',
        ov1Title: 'what I do', ov1Body: 'I make AI accessible and understandable for businesses of all sizes. By combining lean methodology with AI I identify where the real opportunities lie and build the right tools to capture them. I guide you through every step, from first analysis to live implementation.',
        ov2Title: 'my mission', ov2Body: "Every business, regardless of size or budget, should be able to work with AI. That's what drives me. I don't work on an hourly basis. I create tangible value and charge for that value. No surprises, no wasted time. Just results that matter to your business.",
        ov3Title: 'how it helps', ov3Body: 'AI saves time, lowers costs, and creates competitive advantage, but only when applied to the right problem. I cut through the hype and make it concrete for your specific context: simpler processes, faster decisions, and better experiences for end users.',
        ov4Title: 'who I am', ov4Body: "I'm <strong>Jori Veldhuisen</strong>, an experienced lean consultant with a deep passion for AI. By combining lean thinking with AI, I know how to make processes genuinely more efficient. The key lesson: don't jump straight to a solution. First understand the problem deeply. Only then does the right tool become obvious.<br><br>I create value by seizing the right opportunities and simplifying processes for end users.",
        ov5Title: 'who I work with', ov5Body: "I work best with ambitious businesses that are ready to stop wondering what AI could do and start seeing it work. From logistics and e-commerce to healthcare and SaaS: if there's a process that can be smarter, I want to find it.",
        ov6Title: 'what it costs', ov6Body: "No hourly billing. I work on a value-creation basis: I agree on the outcome, define the scope, and set a fixed price. I start with a free intake call, no strings attached. If there's a real opportunity, we'll find it together.",
        footerSub: 'AI made simple for every company',
        footerCopy: '© 2026 Studio Your AI, Panicale, Italy', footerContact: 'Contact',
      },
      nl: {
        heroTitle: 'AI begrijpelijk.<br>Resultaat meetbaar.',
        heroSub: 'AI hoeft niet ingewikkeld te zijn. Ik maak het begrijpbaar en praktisch voor ieder bedrijf, groot of klein. Geen moeilijke woorden of losse theorie, maar concrete aanpak die direct tijd oplevert.',
        ctaDiensten: 'Mijn diensten', ctaGesprek: 'Plan een kennismakingsgesprek →',
        dienstenLabel: 'diensten',
        d1Title: 'Training &amp;<br>Workshops',
        d1Desc: 'Voor groepen van 6 tot 1.200 personen. Van teamdag tot congres. Praktisch, energiek en direct toepasbaar, geen saaie theorie maar tools die je de volgende dag al gebruikt.',
        d2Title: 'Slimme<br>Klantgroei',
        d2Desc: 'Ik gebruik AI om jouw website bezoekers om te zetten naar betalende klanten. Van conversiegerichte content tot geautomatiseerde opvolging: ik bouw het systeem dat jouw groei op gang houdt, ook als jij er niet bij bent.',
        d3Title: 'Processen<br>op Orde',
        d3Desc: 'Ik breng jouw administratieve processen in kaart en automatiseer wat jou onnodig tijd kost. Zodat jij je energie kunt steken in wat er écht toe doet: je klanten en je groei.',
        resultNum: '10 uur / week', resultText: 'Resultaat waar ik voor ga: in 90 dagen minstens 10 uur per week besparen. Meetbaar, concreet, geen vage beloftes.',
        testimonialQuote: '"Jori heeft in korte tijd ons salesproces weten te verbeteren en automatiseren waardoor wij meer tijd over hebben om nieuwe klanten binnen te halen."',
        testimonialCompany: 'Wall to Wall Art Solutions',
        c1Name: 'Wall to Wall<br>Art Solutions', c1ScopeLabel: 'Scope',
        c1Scope: 'N8N Sales Agent',
        c1Desc: 'Een AI-agent in N8N die nieuwe aanvragen voor kunsttransport automatisch beantwoordt als concept-mail. De agent schrijft in de exacte tone of voice van Wall to Wall en vraagt slim alle benodigde informatie op zodat het team direct een offerte kan opmaken.',
        c1StatNum: '6 uur', c1StatLabel: 'bespaard per week',
        ovLabel: 'overzicht',
        ov1Title: 'wat ik doe', ov1Body: 'Ik maak AI toegankelijk en begrijpbaar voor bedrijven van alle groottes. Door lean-denken te combineren met AI bepaal ik waar de echte kansen liggen en bouw ik de juiste tools om die te benutten. Ik begeleid je in elke stap, van eerste analyse tot live implementatie.',
        ov2Title: 'mijn missie', ov2Body: 'Ieder bedrijf, ongeacht omvang of budget, zou gebruik moeten kunnen maken van AI. Dat drijft mij. Ik werk niet op uurbasis. Ik creëer aantoonbare waarde en reken voor die waarde. Geen verrassingen, geen verspilde tijd. Alleen resultaten die er toe doen.',
        ov3Title: 'hoe het helpt', ov3Body: 'AI bespaart tijd, verlaagt kosten en creëert concurrentievoordeel, maar alleen wanneer het op het juiste probleem wordt ingezet. Ik snij door de hype heen en maak het concreet voor jouw context: eenvoudigere processen, snellere beslissingen en betere ervaringen voor eindgebruikers.',
        ov4Title: 'wie ik ben', ov4Body: 'Ik ben <strong>Jori Veldhuisen</strong>, een ervaren lean consultant met een diepe passie voor AI. Door lean-denken te combineren met AI weet ik hoe ik processen écht efficiënter maak. De kernles: schiet niet meteen naar een oplossing. Begrijp eerst het probleem grondig. Pas dan wordt het juiste gereedschap vanzelfsprekend.<br><br>Ik creëer waarde door de juiste kansen te benutten en processen te vereenvoudigen voor eindgebruikers.',
        ov5Title: 'voor wie', ov5Body: 'Ik werk het beste samen met ambitieuze bedrijven die klaar zijn om te stoppen met afvragen wat AI zou kunnen doen en het in actie willen zien. Van logistiek en e-commerce tot zorg en SaaS: als er een proces slimmer kan, wil ik het vinden.',
        ov6Title: 'wat het kost', ov6Body: 'Geen uurtje-factuurtje. Ik werk op basis van waardecreatie: ik spreek een uitkomst af, definieer de scope en stel een vaste prijs vast. Ik start met een gratis intakegesprek, vrijblijvend. Als er een echte kans is, vinden we die samen.',
        footerSub: 'AI begrijpbaar voor ieder bedrijf',
        footerCopy: '© 2026 Studio Your AI, Panicale, Italië', footerContact: 'Contact',
      }
    };

    /* ─── SHARED STYLES ─── */
    const TC = 'rgb(196,89,60)';
    const DARK = 'rgb(37,37,37)';
    const BG = 'rgb(241,240,238)';

    const btnPrimary = {
      fontFamily: "'Oxanium', sans-serif", fontSize: 16, fontWeight: 800,
      letterSpacing: '0.04em', textTransform: 'uppercase',
      background: TC, color: BG,
      border: `2px solid ${TC}`, borderRadius: 4,
      padding: '16px 32px', cursor: 'pointer', textDecoration: 'none',
      display: 'inline-block', transition: 'background 0.3s ease, color 0.3s ease',
    };
    const btnGhost = {
      fontFamily: "'Oxanium', sans-serif", fontSize: 16, fontWeight: 800,
      letterSpacing: '0.04em', textTransform: 'uppercase',
      background: 'transparent', color: DARK,
      border: `2px solid ${DARK}`, borderRadius: 4,
      padding: '16px 32px', cursor: 'pointer', textDecoration: 'none',
      display: 'inline-block', transition: 'background 0.3s ease, color 0.3s ease',
    };

    function Dot() {
      return <div style={{ width: 4, height: 4, borderRadius: '50%', background: DARK, flexShrink: 0 }} />;
    }

    /* ─── NAVBAR ─── */
    function NavBar({ lang, setLang }) {
      return (
        <div className="nav-wrap" style={{ position: 'fixed', top: 16, left: 0, right: 0, zIndex: 200, display: 'flex', justifyContent: 'center', padding: '0 28px', pointerEvents: 'none' }}>
          <nav className="nav-pill" style={{
            pointerEvents: 'all', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            width: '100%',
            background: 'rgba(191,191,191,0.45)',
            backdropFilter: 'blur(30px)', WebkitBackdropFilter: 'blur(30px)',
            borderRadius: 32, padding: '10px 20px'
          }}>
            <a href="javascript:void(0)" style={{ display: 'flex', alignItems: 'center', textDecoration: 'none' }}>
              <span style={{
                fontFamily: "'Oxanium', sans-serif", fontWeight: 800,
                fontSize: 15, letterSpacing: '0.06em', textTransform: 'uppercase',
                color: DARK, lineHeight: 1,
              }}>Studio Your AI</span>
            </a>
            <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
              {['en','nl'].map((l, i) => (
                <React.Fragment key={l}>
                  {i > 0 && <span style={{ fontSize: 10, color: '#bbb' }}>|</span>}
                  <button onClick={() => setLang(l)} style={{
                    fontFamily: "'Space Mono', monospace", fontSize: 11, letterSpacing: '0.06em',
                    background: 'none', border: `1px solid ${lang === l ? DARK : 'transparent'}`,
                    cursor: 'pointer', padding: '2px 7px', color: lang === l ? DARK : '#888',
                    borderRadius: 4, transition: 'all .15s'
                  }}>{l.toUpperCase()}</button>
                </React.Fragment>
              ))}
              <span className="nav-menu-label" style={{ fontFamily: "'Space Mono', monospace", fontSize: 12, letterSpacing: '0.04em', color: DARK, cursor: 'pointer' }}>
                Menu
              </span>
            </div>
          </nav>
        </div>
      );
    }

    /* ─── HERO ─── */
    function HeroSection({ lang, copy }) {
      const c = copy[lang];
      return (
        <section style={{ padding: '24px 28px 32px', display: 'flex', flexDirection: 'column', gap: 0 }}>
          <h1 style={{
            fontFamily: "'Oxanium', sans-serif", fontWeight: 800,
            fontSize: 'clamp(60px, 11.5vw, 140px)', lineHeight: 0.88,
            letterSpacing: '-0.01em', textTransform: 'uppercase',
            color: DARK, transform: 'scaleX(1.07)', transformOrigin: 'left',
          }} dangerouslySetInnerHTML={{ __html: c.heroTitle }} />

          <p style={{ maxWidth: 560, fontSize: 15, lineHeight: 1.7, color: 'rgba(37,37,37,0.75)', paddingTop: 16 }}>
            {c.heroSub}
          </p>

          <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap', marginTop: 20 }}>
            <a href="#diensten" style={btnPrimary}>{c.ctaDiensten}</a>
            <a href="javascript:void(0)" style={btnGhost}>{c.ctaGesprek}</a>
          </div>
        </section>
      );
    }

    /* ─── DIENSTEN ─── */
    function DienstenSection({ lang, copy }) {
      const c = copy[lang];
      const diensten = [
        { num: '01', title: c.d1Title, desc: c.d1Desc },
        { num: '02', title: c.d2Title, desc: c.d2Desc },
        { num: '03', title: c.d3Title, desc: c.d3Desc },
      ];
      return (
        <section id="diensten" style={{ borderTop: '1px solid rgba(37,37,37,0.15)', padding: '48px 28px' }}>
          <div style={{ fontSize: 11, letterSpacing: '0.06em', textTransform: 'lowercase', color: 'rgba(37,37,37,0.5)', marginBottom: 32 }}>
            {c.dienstenLabel}
          </div>

          <div className="diensten-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 0 }}>
            {diensten.map((d, i) => (
              <div key={i} className="diensten-item-inner" style={{
                borderTop: `2px solid ${TC}`,
                padding: '24px 28px 24px 0',
                ...(i > 0 ? { paddingLeft: 28, borderLeft: '1px solid rgba(37,37,37,0.15)' } : {})
              }}>
                <div style={{ fontFamily: "'Oxanium',sans-serif", fontSize: 11, letterSpacing: '0.08em', color: 'rgba(37,37,37,0.4)', marginBottom: 12 }}>{d.num}</div>
                <div style={{ fontFamily: "'Oxanium',sans-serif", fontWeight: 800, fontSize: 'clamp(18px,2vw,26px)', lineHeight: 1.1, textTransform: 'uppercase', color: DARK, marginBottom: 12 }}
                  dangerouslySetInnerHTML={{ __html: d.title }} />
                <div style={{ fontSize: 12, lineHeight: 1.75, color: 'rgba(37,37,37,0.65)' }}>{d.desc}</div>
              </div>
            ))}
          </div>

          {/* Result stat */}
          <div style={{ marginTop: 32, borderTop: '1px solid rgba(37,37,37,0.15)', paddingTop: 20, display: 'flex', alignItems: 'baseline', gap: 12 }}>
            <span style={{ fontFamily: "'Oxanium',sans-serif", fontWeight: 800, fontSize: 'clamp(28px,4vw,48px)', lineHeight: 1, color: TC }}>{c.resultNum}</span>
            <span style={{ fontSize: 12, color: 'rgba(37,37,37,0.6)' }}>{c.resultText}</span>
          </div>

          {/* Testimonial */}
          <div style={{ marginTop: 40, borderTop: `2px solid ${TC}`, paddingTop: 28 }}>
            <blockquote style={{ fontFamily: "'Oxanium',sans-serif", fontWeight: 800, fontSize: 'clamp(18px,2.2vw,28px)', lineHeight: 1.35, color: DARK }}>
              {c.testimonialQuote}
            </blockquote>
            <div style={{ marginTop: 16, display: 'flex', alignItems: 'center', gap: 8, fontSize: 11, letterSpacing: '0.06em', color: 'rgba(37,37,37,0.5)' }}>
              <strong style={{ color: DARK }}>Merijn</strong>
              <Dot />
              <span>{c.testimonialCompany}</span>
            </div>
          </div>
        </section>
      );
    }

    /* ─── N8N FLOW ─── */
    function N8NFlow() {
      const W = 130, H = 58;
      const nodes = [
        { x: 16,  y: 31, label: 'Gmail Trigger', sub: 'Nieuwe mail ontvangen', color: '#EA4335', icon: 'G' },
        { x: 196, y: 31, label: 'Filter',         sub: 'Transport aanvraag?',   color: '#F5A623', icon: 'IF' },
        { x: 376, y: 31, label: 'AI Agent',       sub: 'Genereer concept',       color: '#9B59B6', icon: 'AI' },
        { x: 556, y: 31, label: 'Gmail',          sub: 'Draft opslaan',          color: '#EA4335', icon: 'G' },
      ];
      const conns = nodes.slice(0, -1).map((a, i) => {
        const x1 = a.x + W, y1 = a.y + H / 2;
        const x2 = nodes[i + 1].x, y2 = nodes[i + 1].y + H / 2;
        const mx = (x1 + x2) / 2;
        return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
      });
      return (
        <div className="n8n-outer">
        <div className="n8n-inner" style={{
          position: 'relative', height: 120, borderRadius: 8, overflow: 'hidden',
          background: '#14121e',
          backgroundImage: 'radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px)',
          backgroundSize: '22px 22px',
        }}>
          <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} viewBox="0 0 700 120" preserveAspectRatio="xMidYMid meet">
            {conns.map((d, i) => (
              <React.Fragment key={i}>
                <path d={d} stroke="rgba(255,255,255,0.18)" strokeWidth="1.5" fill="none" />
                <circle cx={nodes[i+1].x} cy={nodes[i+1].y + H/2} r="3" fill="rgba(255,255,255,0.25)" />
              </React.Fragment>
            ))}
          </svg>
          {nodes.map((node, i) => (
            <div key={i} style={{
              position: 'absolute', left: node.x, top: node.y,
              width: W, height: H,
              background: 'rgba(26,24,40,0.97)',
              border: '1px solid rgba(255,255,255,0.1)',
              borderRadius: 8, padding: '8px 10px',
              display: 'flex', alignItems: 'center', gap: 8,
              boxShadow: '0 2px 12px rgba(0,0,0,0.4)',
            }}>
              <div style={{
                width: 30, height: 30, borderRadius: '50%',
                background: node.color,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0, fontSize: 10, color: 'white', fontWeight: 700,
              }}>{node.icon}</div>
              <div>
                <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.85)', marginBottom: 2, fontFamily: "'Space Mono', monospace" }}>{node.label}</div>
                <div style={{ fontSize: 9, color: 'rgba(255,255,255,0.35)', fontFamily: "'Space Mono', monospace", lineHeight: 1.3 }}>{node.sub}</div>
              </div>
              <div style={{ position: 'absolute', right: -5, top: '50%', transform: 'translateY(-50%)', width: 9, height: 9, borderRadius: '50%', background: '#2d2b3e', border: '1.5px solid rgba(255,255,255,0.25)' }} />
              {i > 0 && <div style={{ position: 'absolute', left: -5, top: '50%', transform: 'translateY(-50%)', width: 9, height: 9, borderRadius: '50%', background: '#2d2b3e', border: '1.5px solid rgba(255,255,255,0.25)' }} />}
            </div>
          ))}
        </div>
        </div>
      );
    }

    /* ─── CASE ─── */
    function CaseSection({ lang, copy }) {
      const c = copy[lang];
      return (
        <>
          <div style={{ borderTop: '1px solid rgba(37,37,37,0.15)', padding: '28px 28px 0' }}>
            <div style={{ fontSize: 11, letterSpacing: '0.06em', textTransform: 'lowercase', color: 'rgba(37,37,37,0.5)', marginBottom: 24 }}>
              {lang === 'nl' ? 'een voorbeeld uit de praktijk' : 'a practical example'}
            </div>
          </div>
          <div style={{ padding: '0 28px 36px' }}>
            <div className="case-meta" style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 24, alignItems: 'start', marginBottom: 20 }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <div style={{ fontFamily: "'Oxanium',sans-serif", fontWeight: 800, fontSize: 'clamp(24px,3vw,42px)', lineHeight: 1, textTransform: 'uppercase', color: DARK }}
                  dangerouslySetInnerHTML={{ __html: c.c1Name }} />
                <div style={{ fontSize: 11, letterSpacing: '0.04em', color: DARK, display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                  <span>{c.c1ScopeLabel}</span><Dot /><span>({c.c1Scope})</span>
                </div>
                <div style={{ fontSize: 12, lineHeight: 1.7, color: 'rgba(37,37,37,0.7)', maxWidth: 480 }}>{c.c1Desc}</div>
              </div>
              <div className="case-stat" style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 2 }}>
                <span style={{ fontFamily: "'Oxanium',sans-serif", fontWeight: 800, fontSize: 'clamp(28px,3vw,44px)', lineHeight: 1, color: TC }}>{c.c1StatNum}</span>
                <span style={{ fontSize: 11, letterSpacing: '0.04em', color: 'rgba(37,37,37,0.6)', textAlign: 'right' }}>{c.c1StatLabel}</span>
              </div>
            </div>
            <N8NFlow />
          </div>
        </>
      );
    }

    /* ─── OVERVIEW ─── */
    function OverviewSection({ lang, copy }) {
      const c = copy[lang];
      const rows = [
        { title: c.ov1Title, body: c.ov1Body },
        { title: c.ov2Title, body: c.ov2Body },
        { title: c.ov3Title, body: c.ov3Body },
        { title: c.ov4Title, body: c.ov4Body, photo: true },
        { title: c.ov5Title, body: c.ov5Body },
        { title: c.ov6Title, body: c.ov6Body },
      ];
      return (
        <section className="overview-outer" style={{ borderTop: '1px solid rgba(37,37,37,0.15)', padding: '40px 28px 80px', display: 'grid', gridTemplateColumns: '140px 1fr', gap: '0 32px' }}>
          <div className="overview-label-col">
            <div style={{ fontSize: 11, letterSpacing: '0.06em', textTransform: 'lowercase', color: DARK, paddingTop: 4 }}>{c.ovLabel}</div>
          </div>
          <div>
            {rows.map((row, i) => (
              <div key={i} className="overview-row" style={{
                borderTop: '1px solid rgba(37,37,37,0.15)',
                padding: '24px 0',
                display: 'grid',
                gridTemplateColumns: row.photo ? '260px 1fr 200px' : '260px 1fr',
                gap: 24,
                alignItems: 'start',
                ...(i === rows.length - 1 ? { borderBottom: '1px solid rgba(37,37,37,0.15)' } : {})
              }}>
                <div style={{ fontFamily: "'Oxanium',sans-serif", fontWeight: 800, fontSize: 'clamp(22px,3vw,38px)', lineHeight: 1, textTransform: 'lowercase', color: DARK }}>{row.title}</div>
                <div style={{ fontSize: 13, lineHeight: 1.75, color: DARK, maxWidth: 480 }} dangerouslySetInnerHTML={{ __html: row.body }} />
                {row.photo && (
                  <div className="overview-photo" style={{ borderRadius: 8, overflow: 'hidden', aspectRatio: '3/4', background: '#d0cdc8' }}>
                    <img src="jori-veldhuisen.jpeg" alt="Jori Veldhuisen" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
                  </div>
                )}
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ─── FOOTER ─── */
    function Footer({ lang, copy }) {
      const c = copy[lang];
      return (
        <footer style={{ background: TC, color: BG, padding: '40px 28px 32px' }}>
          <div style={{ fontFamily: "'Oxanium',sans-serif", fontWeight: 800, fontSize: 'clamp(28px,5.5vw,72px)', lineHeight: 1, textTransform: 'uppercase', transform: 'scaleX(1.07)', transformOrigin: 'left', display: 'inline-block' }}>
            Studio Your AI
          </div>
          <div style={{ fontSize: 11, color: 'rgba(241,240,238,0.65)', marginTop: 8, letterSpacing: '0.05em' }}>{c.footerSub}</div>
          <div style={{ marginTop: 40, paddingTop: 20, borderTop: '1px solid rgba(241,240,238,0.25)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 11, color: 'rgba(241,240,238,0.6)', letterSpacing: '0.05em', flexWrap: 'wrap', gap: 12 }}>
            <span>{c.footerCopy}</span>
            <div style={{ display: 'flex', gap: 24 }}>
              <a href="javascript:void(0)" style={{ color: 'rgba(241,240,238,0.6)', textDecoration: 'none' }}
                onMouseEnter={e => e.target.style.color = BG}
                onMouseLeave={e => e.target.style.color = 'rgba(241,240,238,0.6)'}>LinkedIn</a>
              <a href="javascript:void(0)" style={{ color: 'rgba(241,240,238,0.6)', textDecoration: 'none' }}
                onMouseEnter={e => e.target.style.color = BG}
                onMouseLeave={e => e.target.style.color = 'rgba(241,240,238,0.6)'}>{c.footerContact}</a>
            </div>
          </div>
        </footer>
      );
    }

    /* ─── APP ─── */
    function App() {
      const saved = localStorage.getItem('sya-lang');
      const [lang, setLang] = React.useState(saved || 'nl');

      React.useEffect(() => {
        localStorage.setItem('sya-lang', lang);
        document.documentElement.lang = lang;
      }, [lang]);

      return (
        <div>
          <NavBar lang={lang} setLang={setLang} />
          <HeroSection lang={lang} copy={COPY} />
          <DienstenSection lang={lang} copy={COPY} />
          <CaseSection lang={lang} copy={COPY} />
          <OverviewSection lang={lang} copy={COPY} />
          <Footer lang={lang} copy={COPY} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
