<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Your AI – Meer leads omzetten in klanten</title>
  <meta name="description" content="AI die het werk doet: een website die klanten oplevert, opvolging binnen 1 minuut en processen die soepel lopen. Voor MKB'ers die willen groeien zonder harder te werken.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --accent: #C4593C;
      --bg: rgb(241,240,238);
      --dark: rgb(37,37,37);
      --line: rgba(37,37,37,0.15);
      --fh: 'Oxanium', sans-serif;
      --fm: 'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--dark);
      font-family: var(--fm);
      min-height: 100vh;
      overflow-x: hidden;
      padding-top: 76px;
    }

    /* ── NAVBAR ─────────────────────────────────────────── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px;
      background: rgba(191,191,191,0.55);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
    }
    .nav-logo {
      font-family: var(--fh); font-weight: 800; font-size: 15px;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--dark); line-height: 1;
    }
    .nav-langs { display: flex; align-items: center; gap: 4px; }
    .lang-sep { font-size: 10px; color: #bbb; margin: 0 4px; }
    .lang-btn {
      font-family: var(--fm); font-size: 11px; letter-spacing: 0.06em;
      background: none; border: 1px solid transparent; cursor: pointer;
      padding: 2px 7px; color: #888; border-radius: 4px; transition: all .15s;
    }
    .lang-btn.active { border-color: var(--dark); color: var(--dark); }

    /* ── LAYOUT ──────────────────────────────────────────── */
    .sec { padding-left: 28px; padding-right: 28px; }
    .section-div { border-top: 1px solid var(--line); padding: 56px 28px; }

    /* ── ATOMS ───────────────────────────────────────────── */
    .kicker {
      font-family: var(--fm); font-size: 11px; letter-spacing: 0.06em;
      text-transform: lowercase; color: rgba(37,37,37,0.5);
    }
    .dot {
      display: inline-block; width: 4px; height: 4px;
      border-radius: 50%; background: var(--dark);
      flex-shrink: 0; vertical-align: middle;
    }
    .dot-a { background: var(--accent); }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn-p {
      font-family: var(--fh); font-size: 16px; font-weight: 800;
      letter-spacing: 0.04em; text-transform: uppercase;
      background: var(--accent); color: var(--bg);
      border: 2px solid var(--accent); border-radius: 4px;
      padding: 16px 32px; cursor: pointer; text-decoration: none;
      white-space: nowrap; display: inline-block;
      transition: background .25s, color .25s;
    }
    .btn-p:hover { background: transparent; color: var(--accent); }

    /* ── LEAD-FLOW ───────────────────────────────────────── */
    .lf {
      background: #faf9f7; border: 1px solid rgba(37,37,37,0.14);
      border-radius: 10px; padding: 22px 20px; height: 100%;
      display: flex; flex-direction: column;
      box-shadow: 4px 5px 0 rgba(37,37,37,0.05);
    }
    .lf-head {
      font-family: var(--fm); font-size: 11px; letter-spacing: 0.06em;
      text-transform: lowercase; color: rgba(37,37,37,0.5);
      margin-bottom: 18px; padding-bottom: 14px;
      border-bottom: 1px solid rgba(37,37,37,0.1);
    }
    .lf-stages { display: flex; flex-direction: column; flex: 1; justify-content: center; }
    .lf-card {
      border: 1px solid rgba(37,37,37,0.12); border-radius: 8px;
      background: #fff; padding: 11px 14px;
      display: flex; align-items: center; gap: 13px;
    }
    .lf-num {
      font-family: var(--fh); font-weight: 800; font-size: 12px;
      letter-spacing: 0.04em; width: 30px; height: 30px; flex-shrink: 0;
      border-radius: 6px; border: 1.5px solid var(--accent); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }
    .lf-title {
      font-family: var(--fh); font-weight: 700; font-size: 13.5px;
      letter-spacing: 0.01em; text-transform: uppercase; color: var(--dark); line-height: 1.15;
    }
    .lf-conn { height: 13px; display: flex; align-items: center; padding-left: 15px; }
    .lf-conn .bar { width: 2px; height: 100%; background: rgba(37,37,37,0.15); position: relative; }
    .lf-conn .bar::after {
      content: ''; position: absolute; left: 50%; transform: translateX(-50%);
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      top: -3px; opacity: 0;
    }
    .lf-card .lf-num { animation: lfNum 6s ease-in-out infinite; }
    .lf-s0 .lf-num { animation-delay: 0s; }
    .lf-s1 .lf-num { animation-delay: 1.2s; }
    .lf-s2 .lf-num { animation-delay: 2.4s; }
    .lf-s3 .lf-num { animation-delay: 3.6s; }
    .lf-s4 .lf-num { animation-delay: 4.8s; }
    .lf-c0 .bar::after { animation: lfDrop 6s ease-in-out infinite; animation-delay: 0.7s; }
    .lf-c1 .bar::after { animation: lfDrop 6s ease-in-out infinite; animation-delay: 1.9s; }
    .lf-c2 .bar::after { animation: lfDrop 6s ease-in-out infinite; animation-delay: 3.1s; }
    .lf-c3 .bar::after { animation: lfDrop 6s ease-in-out infinite; animation-delay: 4.3s; }
    @keyframes lfNum {
      0%,28%,100% { background: transparent; color: var(--accent); }
      6%,20%      { background: var(--accent); color: #fff; }
    }
    @keyframes lfDrop {
      0%       { top: -3px; opacity: 0; }
      3%       { opacity: 1; }
      10%      { top: 100%; opacity: 1; }
      12%,100% { opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .lf-num, .lf-conn .bar::after { animation: none !important; }
    }

    /* ── HERO ────────────────────────────────────────────── */
    .hero-section {
      padding: 32px 28px 40px;
      display: grid; grid-template-columns: 1fr 38%; gap: 40px; align-items: center;
    }
    .hero-h1 {
      font-family: var(--fh); font-weight: 800;
      font-size: clamp(38px, 5.2vw, 78px); line-height: 0.95;
      letter-spacing: -0.01em; text-transform: uppercase; color: var(--dark);
    }
    .hero-sub {
      max-width: 580px; font-size: 15px; line-height: 1.7;
      color: rgba(37,37,37,0.75); padding-top: 30px;
    }
    .hero-btns { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 24px; }
    .hero-visual { height: clamp(440px, 50vw, 600px); }

    /* ── PROBLEM ─────────────────────────────────────────── */
    .prob-h2 {
      font-family: var(--fh); font-weight: 800;
      font-size: clamp(30px, 5vw, 64px); line-height: 0.98;
      text-transform: uppercase; color: var(--dark); max-width: 900px; margin-top: 28px;
    }
    .prob-body { max-width: 620px; font-size: 15px; line-height: 1.75; color: rgba(37,37,37,0.72); margin-top: 24px; }
    .prob-body2 { max-width: 620px; font-size: 15px; line-height: 1.75; color: rgba(37,37,37,0.72); margin-top: 16px; }
    .punch {
      margin-top: 28px; border-left: 3px solid var(--accent); padding-left: 18px;
    }
    .punch p {
      font-family: var(--fh); font-weight: 700;
      font-size: clamp(18px, 2.4vw, 28px); line-height: 1.25; color: var(--dark); max-width: 640px;
    }
    .prob-cta { margin-top: 28px; }

    /* ── APPROACH ────────────────────────────────────────── */
    .aanpak-h2 {
      font-family: var(--fh); font-weight: 800;
      font-size: clamp(28px, 4vw, 52px); line-height: 1;
      text-transform: uppercase; color: var(--dark); margin-bottom: 36px; margin-top: 12px;
    }
    .steps-grid { display: grid; grid-template-columns: repeat(5, 1fr); }
    .step {
      position: relative; border-top: 2px solid var(--accent); padding: 22px 18px 26px 0;
    }
    .step + .step { padding-left: 18px; border-left: 1px solid var(--line); }
    .step-num { font-family: var(--fh); font-weight: 800; font-size: 13px; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 12px; }
    .step-title { font-family: var(--fh); font-weight: 800; font-size: clamp(16px,1.5vw,21px); line-height: 1.05; text-transform: uppercase; color: var(--dark); margin-bottom: 12px; }
    .step-body { font-size: 12.5px; line-height: 1.65; color: rgba(37,37,37,0.65); }
    .step-arrow { position: absolute; right: -8px; top: 28px; color: var(--accent); font-size: 16px; font-weight: 700; }
    .diensten-row { margin-top: 40px; border-top: 1px solid var(--line); padding-top: 22px; }
    .tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .tag {
      display: inline-flex; align-items: center; gap: 9px;
      font-family: var(--fm); font-size: 12.5px; letter-spacing: 0.02em; color: var(--dark);
      border: 1px solid var(--line); border-radius: 6px; padding: 11px 16px;
    }

    /* ── CASES ───────────────────────────────────────────── */
    .case-h2 {
      font-family: var(--fh); font-weight: 800;
      font-size: clamp(28px,4vw,52px); line-height: 1;
      text-transform: uppercase; color: var(--dark); margin-bottom: 14px; margin-top: 12px;
    }
    .case-intro { max-width: 560px; font-size: 14.5px; line-height: 1.7; color: rgba(37,37,37,0.72); }
    .case-card {
      background: #faf9f7; border: 1px solid var(--line); border-radius: 12px;
      padding: clamp(22px,3vw,38px); box-shadow: 4px 5px 0 rgba(37,37,37,0.05); margin-top: 34px;
    }
    .branche-tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--fm); font-size: 11px; letter-spacing: 0.04em; color: var(--dark);
      border: 1px solid var(--accent); border-radius: 20px; padding: 6px 13px; margin-bottom: 22px;
    }
    .promise-wrap { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 30px; max-width: 760px; }
    .promise-lbl {
      font-family: var(--fm); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); border: 1px solid var(--accent); border-radius: 20px;
      padding: 4px 11px; white-space: nowrap; margin-top: 4px; flex-shrink: 0;
    }
    .promise-txt {
      font-family: var(--fh); font-weight: 700;
      font-size: clamp(20px,2.6vw,32px); line-height: 1.2; color: var(--dark);
    }
    .case-head { display: grid; grid-template-columns: 1fr auto; gap: 28px; align-items: start; margin-bottom: 22px; }
    .case-name { font-family: var(--fh); font-weight: 800; font-size: clamp(26px,3vw,46px); line-height: 0.95; text-transform: uppercase; color: var(--dark); }
    .case-scope { font-size: 11px; letter-spacing: 0.04em; color: var(--dark); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
    .case-desc { font-size: 13px; line-height: 1.75; color: rgba(37,37,37,0.7); max-width: 520px; margin-top: 4px; }
    .case-stats { display: flex; flex-direction: column; gap: 18px; align-items: flex-end; }
    .stat-num { font-family: var(--fh); font-weight: 800; font-size: clamp(26px,3.2vw,44px); line-height: 1; color: var(--accent); text-align: right; }
    .stat-lbl { font-size: 11px; letter-spacing: 0.03em; color: rgba(37,37,37,0.6); text-align: right; }
    .testimonial { margin-top: 32px; border-top: 2px solid var(--accent); padding-top: 24px; max-width: 760px; }
    .testimonial blockquote { font-family: var(--fh); font-weight: 700; font-size: clamp(17px,2vw,26px); line-height: 1.4; color: var(--dark); }
    .t-meta { margin-top: 14px; display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.05em; color: rgba(37,37,37,0.5); }
    .t-name { color: var(--dark); font-weight: 700; }
    .review-cta { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-top: 24px; padding: 4px 2px; }
    .review-cta-txt { font-family: var(--fh); font-weight: 700; font-size: clamp(18px,2.2vw,26px); line-height: 1.2; color: var(--dark); }
    .case2-intro { font-family: var(--fh); font-weight: 700; font-size: clamp(17px,2.2vw,26px); line-height: 1.3; color: var(--dark); max-width: 680px; margin-bottom: 26px; }

    /* ── N8N FLOW ────────────────────────────────────────── */
    .n8n-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 8px; }
    .n8n-canvas {
      width: 700px; height: 120px; position: relative;
      border-radius: 8px; overflow: hidden;
      background: #14121e;
      background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .n8n-node {
      position: absolute; width: 130px; height: 58px;
      background: rgba(26,24,40,0.97); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 10px; display: flex; align-items: center; gap: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .n8n-icon {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 10px; color: white; font-weight: 700; font-family: var(--fm);
    }
    .n8n-lbl { font-size: 10px; color: rgba(255,255,255,0.85); margin-bottom: 2px; font-family: var(--fm); }
    .n8n-sub { font-size: 9px; color: rgba(255,255,255,0.35); font-family: var(--fm); line-height: 1.3; }
    .n8n-port {
      position: absolute; width: 9px; height: 9px; border-radius: 50%;
      background: #2d2b3e; border: 1.5px solid rgba(255,255,255,0.25); top: 50%; transform: translateY(-50%);
    }
    .n8n-port-r { right: -5px; }
    .n8n-port-l { left: -5px; }

    /* ── ABOUT ───────────────────────────────────────────── */
    .about-grid { display: grid; grid-template-columns: 230px 1fr; gap: 36px; align-items: start; }
    .about-photo { border-radius: 8px; overflow: hidden; aspect-ratio: 3/4; background: #d0cdc8; }
    .about-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .about-h2 {
      font-family: var(--fh); font-weight: 800; font-size: clamp(26px,3.4vw,44px);
      line-height: 1; text-transform: uppercase; color: var(--dark); margin-bottom: 20px; margin-top: 12px;
    }
    .about-body { font-size: 14px; line-height: 1.8; color: var(--dark); max-width: 560px; }
    .about-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
    .about-tag {
      font-family: var(--fm); font-size: 11px; letter-spacing: 0.04em;
      color: rgba(37,37,37,0.7); border: 1px solid var(--line); border-radius: 20px; padding: 7px 15px;
    }

    /* ── CTA ─────────────────────────────────────────────── */
    .cta-section { padding-bottom: 72px; }
    .cta-h2 {
      font-family: var(--fh); font-weight: 800; font-size: clamp(30px,5.5vw,72px);
      line-height: 0.95; text-transform: uppercase; color: var(--dark);
    }
    .cta-sub { max-width: 560px; font-size: 15px; line-height: 1.7; color: rgba(37,37,37,0.72); margin-top: 22px; }
    .cta-btns { margin-top: 28px; }

    /* ── BOOKING ─────────────────────────────────────────── */
    #booking { scroll-margin-top: 90px; }
    .booking-h2 {
      font-family: var(--fh); font-weight: 800; font-size: clamp(28px,4vw,52px);
      line-height: 1; text-transform: uppercase; color: var(--dark); margin-bottom: 14px; margin-top: 12px;
    }
    .booking-sub { max-width: 560px; font-size: 14.5px; line-height: 1.7; color: rgba(37,37,37,0.72); margin-bottom: 16px; }
    .booking-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 34px; }
    .booking-meta-item {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--fm); font-size: 12px; letter-spacing: 0.02em; color: var(--dark);
      border: 1px solid var(--line); border-radius: 6px; padding: 8px 14px;
    }
    .booking-card {
      background: #faf9f7; border: 1px solid var(--line); border-radius: 10px;
      padding: clamp(12px,2vw,22px); box-shadow: 4px 5px 0 rgba(37,37,37,0.05); max-width: 980px;
    }
    #cal-inline { width: 100%; min-height: 620px; overflow: hidden; border-radius: 6px; }

    /* ── FOOTER ──────────────────────────────────────────── */
    footer { background: var(--accent); color: var(--bg); padding: 48px 28px 36px; }
    .footer-logo {
      font-family: var(--fh); font-weight: 800; font-size: clamp(28px,5.5vw,72px);
      line-height: 1; text-transform: uppercase;
      transform: scaleX(1.05); transform-origin: left; display: inline-block;
    }
    .footer-sub { font-size: 11px; color: rgba(241,240,238,0.65); margin-top: 10px; letter-spacing: 0.05em; }
    .footer-bottom {
      margin-top: 44px; padding-top: 22px; border-top: 1px solid rgba(241,240,238,0.25);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: rgba(241,240,238,0.6); letter-spacing: 0.05em; flex-wrap: wrap; gap: 12px;
    }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: rgba(241,240,238,0.6); text-decoration: none; transition: color .15s; }
    .footer-links a:hover { color: var(--bg); }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 640px) {
      body { padding-top: 68px; }
      .sec, .section-div { padding-left: 16px; padding-right: 16px; }
      .hero-section { grid-template-columns: 1fr; gap: 24px; }
      .hero-btns { flex-direction: column; align-items: stretch; }
      .hero-btns .btn-p { text-align: center; font-size: 14px; padding: 15px 18px; }
      .steps-grid { grid-template-columns: 1fr; }
      .step + .step { border-left: none; padding-left: 0; }
      .step-arrow { display: none; }
      .case-head { grid-template-columns: 1fr; }
      .case-stats { align-items: flex-start; }
      .review-cta { flex-direction: column; align-items: stretch; }
      .review-cta .btn-p { text-align: center; }
      .about-grid { grid-template-columns: 1fr; }
      .about-photo { max-width: 220px; margin: 0 auto; }
      .footer-bottom { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
    @media (min-width: 641px) and (max-width: 900px) {
      .steps-grid { grid-template-columns: 1fr; }
      .step + .step { border-left: none; padding-left: 0; }
      .step-arrow { display: none; }
    }
  </style>
</head>
<body>

<!-- ── NAVBAR ──────────────────────────────────────────────────── -->
<nav class="navbar">
  <span class="nav-logo">Studio Your AI</span>
  <div class="nav-langs">
    <button class="lang-btn active" data-lang="nl" onclick="setLang('nl')">NL</button>
    <span class="lang-sep">|</span>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  </div>
</nav>

<!-- ── HERO ────────────────────────────────────────────────────── -->
<section class="sec hero-section">
  <div>
    <h1 class="hero-h1" data-ihtml="heroVariant"></h1>
    <p class="hero-sub" data-i="heroSub"></p>
    <div class="hero-btns">
      <a href="#booking" class="btn-p" data-i="heroCta"></a>
    </div>
  </div>
  <div class="hero-visual">
    <div class="lf">
      <div class="lf-head" data-i="flowLabel"></div>
      <div class="lf-stages" id="lf-stages"></div>
    </div>
  </div>
</section>

<!-- ── PROBLEM ──────────────────────────────────────────────────── -->
<section class="section-div">
  <div class="kicker" data-i="probKicker"></div>
  <h2 class="prob-h2" data-ihtml="probTitle"></h2>
  <p class="prob-body" data-i="probBody"></p>
  <p class="prob-body2" data-i="probBody2"></p>
  <div class="punch"><p data-i="probPunch"></p></div>
  <div class="prob-cta hero-btns">
    <a href="#booking" class="btn-p" data-i="probCta"></a>
  </div>
</section>

<!-- ── APPROACH ─────────────────────────────────────────────────── -->
<section class="section-div">
  <div class="kicker" data-i="aanpakKicker"></div>
  <h2 class="aanpak-h2" data-i="aanpakTitle"></h2>
  <div class="steps-grid" id="steps-grid"></div>
  <div class="diensten-row">
    <div class="kicker" data-i="dienstenLabel"></div>
    <div class="tags" id="tags-wrap"></div>
  </div>
</section>

<!-- ── CASES ────────────────────────────────────────────────────── -->
<section class="section-div">
  <div class="kicker" data-i="caseKicker"></div>
  <h2 class="case-h2" data-i="caseTitle"></h2>
  <p class="case-intro" data-i="caseIntro"></p>

  <!-- Case 1 -->
  <div class="case-card">
    <div class="branche-tag"><span class="dot dot-a"></span> <span data-i="caseBranche"></span></div>
    <div class="promise-wrap">
      <span class="promise-lbl" data-i="casePromiseLabel"></span>
      <p class="promise-txt" data-i="casePromise"></p>
    </div>
    <div class="case-head">
      <div>

/* ── N8N FLOW ──────────────────────────────────────────────────── */
function renderN8N() {
  const svg = document.getElementById('n8n-svg');
  const canvas = document.getElementById('n8n-canvas');
  if (!svg || !canvas) return;

  const W = 130, H = 58;
  const nodes = [
    { x: 16,  y: 31, label: 'Gmail Trigger', sub: 'Nieuwe mail ontvangen', color: '#EA4335', icon: 'G' },
    { x: 196, y: 31, label: 'Filter',        sub: 'Transport aanvraag?',   color: '#F5A623', icon: 'IF' },
    { x: 376, y: 31, label: 'AI Agent',      sub: 'Genereer concept',      color: '#9B59B6', icon: 'AI' },
    { x: 556, y: 31, label: 'Gmail',         sub: 'Draft opslaan',         color: '#EA4335', icon: 'G' },
  ];

  // SVG paths
  let svgHTML = '';
  nodes.slice(0, -1).forEach((a, i) => {
    const x1 = a.x + W, y1 = a.y + H / 2;
    const x2 = nodes[i + 1].x, y2 = nodes[i + 1].y + H / 2;
    const mx = (x1 + x2) / 2;
    svgHTML += '<path d="M' + x1 + ',' + y1 + ' C' + mx + ',' + y1 + ' ' + mx + ',' + y2 + ' ' + x2 + ',' + y2 + '" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" fill="none"/>';
    svgHTML += '<circle cx="' + nodes[i+1].x + '" cy="' + (nodes[i+1].y + H/2) + '" r="3" fill="rgba(255,255,255,0.25)"/>';
  });
  svg.innerHTML = svgHTML;

  // Nodes
  nodes.forEach((node, i) => {
    const div = document.createElement('div');
    div.className = 'n8n-node';
    div.style.left = node.x + 'px';
    div.style.top = node.y + 'px';
    div.innerHTML =
      '<div class="n8n-icon" style="background:' + node.color + '">' + node.icon + '</div>' +
      '<div><div class="n8n-lbl">' + node.label + '</div><div class="n8n-sub">' + node.sub + '</div></div>' +
      '<div class="n8n-port n8n-port-r"></div>' +
      (i > 0 ? '<div class="n8n-port n8n-port-l"></div>' : '');
    canvas.appendChild(div);
  });
}
